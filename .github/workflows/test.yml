name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run shell tests
        run: bash tests/run.sh
